version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/aiza"
      REDIS_URL: "redis://redis:6379"
      PORT: 3000
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aiza
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped

volumes:
  db-data:
